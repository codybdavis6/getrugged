services:
  - type: worker
    name: getrugged-bot
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: TG_BOT_TOKEN
        sync: false
      - key: RPC_MAIN
        sync: false
      - key: PAYER_KEY
        sync: false
      - key: DRY_RUN
        value: false
      - key: FUND_SOL_PER_WALLET
        value: 0.02
      - key: SOL_IN_LP
        value: 0.5